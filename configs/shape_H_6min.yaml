# shape_H_6min.yaml — Letter H geometry, 6 min
#
# XZ cross-section — EQS with PHYSICALLY CORRECT uniform-sigma model
#
# ── H-shape geometry ─────────────────────────────────────────────────────────
# Two vertical legs (6 mm wide each) connected by a central crossbar (6 mm tall)
# Bounding box: 20 mm × 20 mm (same as canonical square)
# Fill fraction: 288/400 = 72% (notch cut-outs on left and right sides)
#
# ── Why H is interesting for uniformity ──────────────────────────────────────
# The H has 5 distinct face types with different RF coupling:
#   (1) Outer top/bottom (⊥ E-field):    highest Q_rf (~11× mean) → hottest faces
#   (2) Outer left/right (∥ E-field):    lowest Q_rf (~1.6× mean) → coolest outer faces
#   (3) Inner vertical faces (∥ E-field): also low Q_rf (inside the notch cutouts)
#   (4) Inner horizontal faces (⊥ E-field): moderate Q_rf (crossbar notch top/bottom)
#   (5) Outer corners:                   highest Q_rf (~37× mean) → hottest corners
#
# Expected as-sintered result WITHOUT prewarp:
#   • Outer corners densify most → retract inward → rounded outer corners
#   • Outer top/bottom densify well → retract
#   • Outer left/right barely densify → inner corners of notch barely densify
#   • Result: highly non-uniform boundary density, significant dimensional error
#
# ── RF PHYSICS ───────────────────────────────────────────────────────────────

geometry:
  chamber_x: 0.060    # 60 mm — 20 mm gap on each side of 20 mm bounding box
  chamber_y: 0.060    # 60 mm
  grid_nx: 120        # ~0.5 mm resolution
  grid_ny: 120
  part:
    shape: H_shape
    width:  0.020     # 20 mm bounding box width
    height: 0.020     # 20 mm bounding box height
    center_x: 0.0
    center_y: 0.0
    rotation_deg: 0.0

electrodes:
  mode: boundary
  hi_boundary: top     # y = +30 mm → V = 0
  lo_boundary: bottom  # y = -30 mm → V = 860 V
  boundary_cells: 1

electric:
  frequency_hz: 27120000.0
  voltage_v: 860.0
  voltage_mode: grounded
  solver_steps: 3000
  solver_tol: 1.0e-9
  update_interval: 20
  power_factor: 1.0
  max_qrf_w_per_m3: 1.0e11
  zero_qrf_outside_doped: true
  enforce_generator_power: true
  generator_power_w: 500.0
  generator_transfer_efficiency: 0.020   # 2% coupling — same as square calibration
  effective_depth_m: 0.020

thermal:
  ambient_c: 23.0
  convection_h_w_per_m2k: 5.0
  convective_boundaries:
    - top
  dt_s: 0.5
  n_steps: 720          # 360 s = 6 min
  max_deltaT_per_step_c: 10.0
  min_temp_c: -50.0
  max_temp_c: 600.0
  phase_change:
    model: comsol_heaviside
    t_pc_c: 180.0
    dt_pc_c: 10.0
    latent_heat_j_per_kg: 96700.0
    smooth_shape: linear
  depth_correction:
    enabled: false

densification:
  rho_rel_initial: 0.55
  model: physics_dual
  rho_exponent: 1.0
  max_delta_per_step: 0.02
  k0_ss_per_s: 0.005
  activation_energy_ss_j_per_mol: 48000.0
  phi_solid_exponent: 0.8
  k0_liq_per_s: 0.08
  activation_energy_liq_j_per_mol: 0.0
  phi_threshold: 0.01
  phi_liq_exponent: 1.0
  liquid_rate_mode: viscous_capillary
  surface_tension_n_per_m: 0.03
  particle_radius_m: 3.5e-5
  eta_ref_pa_s: 8.0e3
  eta_ref_temp_k: 458.15
  eta_activation_j_per_mol: 6.0e4
  geom_factor: 0.05
  k0_per_s: 0.08
  activation_energy_j_per_mol: 42000.0

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0
  powder:
    rho_solid_kg_per_m3: 490.0
    k_solid_w_per_mk: 0.197
    cp_solid_j_per_kgk: 1072.0
  doped:
    sigma_s_per_m: 0.04
    sigma_profile: uniform
    eps_r: 20.0
    sigma_temp_coeff_per_K: 0.0
    sigma_density_coeff: 0.0
    sigma_ref_temp_c: 23.0
    rho_solid_kg_per_m3: 460.0
    rho_liquid_kg_per_m3: 1010.0
    k_solid_w_per_mk: 0.10
    k_liquid_w_per_mk: 0.26
    cp_solid_j_per_kgk: 2500.0
    cp_liquid_j_per_kgk: 3279.0

reporting:
  potential_contours: 18
  temp_cbar_min_c: 20.0
  temp_cbar_max_c: 400.0
