# COMSOL Quadrant Model - Corrected 2D Cross-Section
#
# GEOMETRY INTERPRETATION (from HTML report, confirmed):
#   COMSOL model is a QUADRANT (1/4) of the full geometry.
#   Symmetry planes at x=0 and y=0; electrodes on z-faces.
#
#   COMSOL quadrant:
#     Chamber: (0,0,-2mm) to (21,16,20mm)  [21×16×22mm]
#     Part:    (0,0,10mm)  to (10,10,20mm) [10×10×10mm, corner x=0,y=0, top z=20mm]
#
#   Full geometry after x/y mirroring:
#     Chamber: 42mm × 32mm × 22mm
#     Part:    20mm × 20mm × 10mm, centered in x-y, touching TOP electrode
#
#   Electrodes (z-direction):
#     z = +20mm (top)  → V=0  (COMSOL Boundaries 2+5, split by part)
#     z = -2mm  (bot)  → V=860V  (COMSOL Boundary 10, all-powder)
#
#   Electrode spacing: 22mm
#
# 2D CROSS-SECTION (x-z plane, using Python y = COMSOL z):
#   chamber_x = 42mm (full mirrored x-width)
#   chamber_y = 22mm (electrode-to-electrode in z)
#   Part: 20mm wide × 10mm tall, centered in x, touching TOP electrode
#   Part center: y = +6mm above chamber center
#     (part occupies y = +1mm to +11mm = touching top electrode at y=+11mm)
#
# All external walls: insulated (symmetry planes are interior in full model)
# No depth correction needed (z-direction IS the electrode/model axis)

geometry:
  chamber_x: 0.042    # 42mm full mirrored width (2 × 21mm quadrant)
  chamber_y: 0.022    # 22mm electrode spacing (z: -2mm to +20mm)
  grid_nx: 210        # 0.2mm resolution in x
  grid_ny: 110        # 0.2mm resolution in y (electrode direction)
  part:
    shape: square
    width: 0.020       # 20mm full mirrored part width (2 × 10mm)
    height: 0.010      # 10mm part height (z=10mm to z=20mm)
    center_x: 0.0     # centered in x
    center_y: 0.006   # +6mm: part from y=+1mm to y=+11mm, touching top electrode
    rotation_deg: 0.0
    n_circle_pts: 260

electrodes:
  mode: boundary
  hi_boundary: top     # top electrode (z=20mm in COMSOL, V=0 in COMSOL → but
                       # polarity sign doesn't affect |E|² or Q_rf)
  lo_boundary: bottom  # bottom electrode (z=-2mm in COMSOL, V=860V)
  boundary_cells: 1

electric:
  frequency_hz: 27120000.0
  voltage_v: 860.0
  voltage_mode: grounded
  solver_steps: 1200
  solver_tol: 1.0e-9
  update_interval: 1
  power_factor: 1.0
  max_qrf_w_per_m3: 5.0e9

thermal:
  ambient_c: 23.0
  # No convection on outer walls (symmetry planes are interior in full model;
  # the COMSOL convection on boundary 7 is on a symmetry plane, not an
  # outer wall of the full mirrored geometry).
  convection_h_w_per_m2k: 0.0
  convective_boundaries: []
  dt_s: 0.5
  n_steps: 720          # 6 min = 360 s
  max_deltaT_per_step_c: 3.0
  min_temp_c: -50.0
  max_temp_c: 450.0
  phase_change:
    model: comsol_heaviside
    t_pc_c: 185.0
    dt_pc_c: 10.0
    smooth_shape: linear
    latent_heat_j_per_kg: 96700.0
  # Depth correction DISABLED: the z-direction is the electrode axis (already
  # modeled). No out-of-plane correction needed for the 2D x-z cross-section.
  depth_correction:
    enabled: false

densification:
  rho_rel_initial: 0.55
  model: physics_dual
  rho_exponent: 1.0
  max_delta_per_step: 0.02
  k0_ss_per_s: 0.005
  activation_energy_ss_j_per_mol: 48000.0
  phi_solid_exponent: 0.8
  k0_liq_per_s: 0.08
  activation_energy_liq_j_per_mol: 0.0
  phi_threshold: 0.01
  phi_liq_exponent: 1.0
  liquid_rate_mode: viscous_capillary
  surface_tension_n_per_m: 0.03
  particle_radius_m: 3.5e-5
  eta_ref_pa_s: 8.0e3
  eta_ref_temp_k: 458.15
  eta_activation_j_per_mol: 6.0e4
  geom_factor: 0.05
  k0_per_s: 0.08
  activation_energy_j_per_mol: 42000.0

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0

  powder:
    # COMSOL Heat Transfer in Solids 1 (base domain)
    rho_solid_kg_per_m3: 490.0
    k_solid_w_per_mk: 0.197
    cp_solid_j_per_kgk: 1072.0

  doped:
    sigma_s_per_m: 0.04
    eps_r: 20.0
    sigma_temp_coeff_per_K: 0.0
    sigma_density_coeff: 0.0
    sigma_ref_temp_c: 23.0
    # COMSOL Phase Change Material: Phase 1 (solid)
    rho_solid_kg_per_m3: 460.0
    # COMSOL Phase Change Material: Phase 2 (liquid)
    rho_liquid_kg_per_m3: 1010.0
    k_solid_w_per_mk: 0.10
    k_liquid_w_per_mk: 0.26
    cp_solid_j_per_kgk: 2500.0
    cp_liquid_j_per_kgk: 3279.0

reporting:
  potential_contours: 18
  temp_cbar_min_c: 20.0
  temp_cbar_max_c: 300.0
