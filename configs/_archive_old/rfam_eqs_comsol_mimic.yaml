geometry:
  chamber_x: 0.070
  chamber_y: 0.070
  grid_nx: 220
  grid_ny: 220
  part:
    shape: square
    width: 0.040
    height: 0.040
    center_x: 0.0
    center_y: 0.0
    rotation_deg: 0.0
    n_circle_pts: 260

electrodes:
  # Use internal parallel plates (surrogate for COMSOL electrode boundaries).
  mode: plates
  spacing: 0.0112
  length: 0.0624
  thickness: 0.0010
  angle_deg: 0.0
  center_x: 0.0
  center_y: 0.0

electric:
  frequency_hz: 27120000.0
  # COMSOL report parameter: Vzero = 860 V (peak)
  voltage_v: 860.0
  # COMSOL-style reference: one electrode at Vzero, one at 0 V.
  voltage_mode: grounded
  solver_steps: 1200
  solver_tol: 1.0e-9
  # Re-solve electric field every thermal step to match tightly-coupled updates.
  update_interval: 1
  # Keep as Re{J.E*} form used in the RPJ equations.
  power_factor: 1.0
  max_qrf_w_per_m3: 5.0e9

thermal:
  # COMSOL report parameter: Tzero = 23 C
  ambient_c: 23.0
  # Report uses "Internal natural convection, narrow chimney, parallel plates"
  convection_model: natural_chimney_parallel_plates
  conv_plate_distance_m: 0.01
  conv_chimney_height_m: 0.01
  conv_pressure_pa: 101330.0
  conv_external_temp_k: 293.15
  # Kept as fallback for constant-convection mode.
  convection_h_w_per_m2k: 25.0
  # COMSOL-like boundary treatment: insulation everywhere, convection only on one exposed boundary.
  # Boundary 7 from COMSOL maps to top boundary in this 2D surrogate.
  convective_boundaries: ["top"]
  dt_s: 0.2
  n_steps: 900
  max_deltaT_per_step_c: 3.0
  min_temp_c: -50.0
  max_temp_c: 450.0
  phase_change:
    # Use the paper's nylon transition window to stay physically realistic.
    solidus_c: 120.0
    liquidus_c: 180.0
    latent_heat_j_per_kg: 96700.0

densification:
  rho_rel_initial: 0.55
  k0_per_s: 0.08
  activation_energy_j_per_mol: 42000.0

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0

  powder:
    rho_solid_kg_per_m3: 460.0
    k_solid_w_per_mk: 0.10
    cp_solid_j_per_kgk: 1287.0

  doped:
    sigma_s_per_m: 0.04
    # COMSOL report uses eps_r = 20 in the electrical property table.
    eps_r: 20.0
    sigma_temp_coeff_per_K: 0.002
    sigma_density_coeff: 0.6
    sigma_ref_temp_c: 23.0

    rho_solid_kg_per_m3: 1010.0
    rho_liquid_kg_per_m3: 950.0

    k_solid_w_per_mk: 0.10
    k_liquid_w_per_mk: 0.26

    cp_solid_j_per_kgk: 1287.0
    cp_liquid_j_per_kgk: 2500.0
