geometry:
  chamber_x: 0.070
  chamber_y: 0.070
  grid_nx: 140
  grid_ny: 140
  part:
    shape: square
    width: 0.040
    height: 0.040
    center_x: 0.0
    center_y: 0.0
    rotation_deg: 0.0
    n_circle_pts: 240

electrodes:
  spacing: 0.0112
  length: 0.0624
  thickness: 0.0010
  angle_deg: 0.0
  center_x: 0.0
  center_y: 0.0

electric:
  frequency_hz: 27120000.0
  voltage_v: 1200.0
  solver_steps: 900
  solver_tol: 1.0e-8
  update_interval: 25
  # 1.0 uses Re{J.E*}; use 0.5 if you want sinusoidal peak->RMS averaging.
  power_factor: 1.0
  # Numerical guardrail for very localized spikes in the 2D surrogate.
  max_qrf_w_per_m3: 2.0e9

thermal:
  ambient_c: 20.0
  convection_h_w_per_m2k: 25.0
  dt_s: 0.2
  n_steps: 900
  # Keep fixed dt for physical timeline while limiting explicit update rate.
  max_deltaT_per_step_c: 3.0
  min_temp_c: -50.0
  max_temp_c: 450.0
  phase_change:
    solidus_c: 120.0
    liquidus_c: 180.0
    latent_heat_j_per_kg: 96700.0

densification:
  rho_rel_initial: 0.55
  k0_per_s: 0.08
  activation_energy_j_per_mol: 42000.0

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0

  powder:
    rho_solid_kg_per_m3: 490.0
    k_solid_w_per_mk: 0.10
    cp_solid_j_per_kgk: 1287.0

  doped:
    sigma_s_per_m: 0.04
    eps_r: 13.8
    sigma_temp_coeff_per_K: 0.002
    sigma_density_coeff: 0.6
    sigma_ref_temp_c: 20.0

    rho_solid_kg_per_m3: 1010.0
    rho_liquid_kg_per_m3: 950.0

    k_solid_w_per_mk: 0.10
    k_liquid_w_per_mk: 0.26

    cp_solid_j_per_kgk: 1287.0
    cp_liquid_j_per_kgk: 2500.0
