# COMSOL-matched config: y-axis electrode (16mm spacing), confirmed from E-field export data
#
# COORDINATE SYSTEM (confirmed from vol_fields_single_time-export.txt analysis):
#   COMSOL x: 0→21mm   (width, quadrant; full-mirrored: -21→21mm = 42mm)
#   COMSOL y: 0→16mm   (ELECTRODE AXIS, 16mm spacing)
#     y=0    → ground electrode (V=0),  Boundaries 2,5
#     y=16mm → driven electrode (V=860V), Boundary 10
#   COMSOL z: -2→20mm  (height, 22mm total; out-of-plane in this 2D model)
#
# PART (COMSOL quadrant): x=[0,10mm], y=[0,10mm], z=[10,20mm]
#   After x-mirror: x=[-10,10mm] → center_x=0, width=20mm
#   y: COMSOL [0,10mm] → Python y_py = COMSOL_y - 8mm = [-8,+2mm]
#     center_y_py = -3mm
#     Part TOUCHES BOTTOM electrode (y_py=-8mm = COMSOL y=0 = ground)
#
# OUT-OF-PLANE (z): depth_correction for z-direction heat losses
#   part_depth_m = 0.010  (z=10→20mm, 10mm)
#   chamber_depth_m = 0.022  (z=-2→20mm, 22mm total)
#
# Q_rf FORMULA FIXED: 0.5 factor added in rfam_eqs_coupled.py line 339
#   (COMSOL uses 0.5*Re{(sigma+j*omega*eps)|E|^2} for time-averaged heating)

geometry:
  chamber_x: 0.042    # 42mm full mirrored width (2 × 21mm COMSOL x-quadrant)
  chamber_y: 0.016    # 16mm electrode spacing (COMSOL y-axis)
  grid_nx: 210        # ~0.2mm resolution in x
  grid_ny: 80         # 0.2mm resolution in y
  part:
    shape: square
    width: 0.020       # 20mm full mirrored part width (2 × 10mm)
    height: 0.010      # 10mm part height in electrode direction (COMSOL y=0→10mm)
    center_x: 0.0      # centered in x (after mirroring)
    center_y: -0.003   # -3mm: part from y_py=-8mm to y_py=+2mm, touching bottom electrode
    rotation_deg: 0.0
    n_circle_pts: 260

electrodes:
  mode: boundary
  hi_boundary: top     # y_py=+8mm → COMSOL y=16mm → driven at V=860V
  lo_boundary: bottom  # y_py=-8mm → COMSOL y=0mm  → ground  (V=0)
  boundary_cells: 1

electric:
  frequency_hz: 27120000.0
  voltage_v: 860.0
  voltage_mode: grounded
  solver_steps: 1200
  solver_tol: 1.0e-9
  update_interval: 1
  power_factor: 1.0
  max_qrf_w_per_m3: 5.0e9

thermal:
  ambient_c: 23.0
  # z-face convection handled by depth_correction; 2D boundaries all insulated
  convection_h_w_per_m2k: 0.0
  convective_boundaries: []
  dt_s: 0.5
  n_steps: 720          # 6 min = 360 s
  max_deltaT_per_step_c: 3.0
  min_temp_c: -50.0
  max_temp_c: 450.0
  phase_change:
    model: comsol_heaviside
    t_pc_c: 185.0
    dt_pc_c: 10.0
    smooth_shape: linear
    latent_heat_j_per_kg: 96700.0
  # Depth correction: z-direction losses (part: 10mm deep; chamber: 22mm total in z)
  depth_correction:
    enabled: true
    part_depth_m: 0.010    # COMSOL z: part occupies z=10→20mm (10mm)
    chamber_depth_m: 0.022 # COMSOL z: chamber is z=-2→20mm (22mm total)

densification:
  rho_rel_initial: 0.55
  model: physics_dual
  rho_exponent: 1.0
  max_delta_per_step: 0.02
  k0_ss_per_s: 0.005
  activation_energy_ss_j_per_mol: 48000.0
  phi_solid_exponent: 0.8
  k0_liq_per_s: 0.08
  activation_energy_liq_j_per_mol: 0.0
  phi_threshold: 0.01
  phi_liq_exponent: 1.0
  liquid_rate_mode: viscous_capillary
  surface_tension_n_per_m: 0.03
  particle_radius_m: 3.5e-5
  eta_ref_pa_s: 8.0e3
  eta_ref_temp_k: 458.15
  eta_activation_j_per_mol: 6.0e4
  geom_factor: 0.05
  k0_per_s: 0.08
  activation_energy_j_per_mol: 42000.0

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0

  powder:
    rho_solid_kg_per_m3: 490.0
    k_solid_w_per_mk: 0.197
    cp_solid_j_per_kgk: 1072.0

  doped:
    sigma_s_per_m: 0.04
    eps_r: 20.0
    sigma_temp_coeff_per_K: 0.0
    sigma_density_coeff: 0.0
    sigma_ref_temp_c: 23.0
    rho_solid_kg_per_m3: 460.0
    rho_liquid_kg_per_m3: 1010.0
    k_solid_w_per_mk: 0.10
    k_liquid_w_per_mk: 0.26
    cp_solid_j_per_kgk: 2500.0
    cp_liquid_j_per_kgk: 3279.0

reporting:
  potential_contours: 18
  temp_cbar_min_c: 20.0
  temp_cbar_max_c: 300.0
