geometry:
  chamber_x: 0.07
  chamber_y: 0.07
  grid_nx: 160
  grid_ny: 160
  part:
    shape: square
    width: 0.04
    height: 0.04
    center_x: 0.0
    center_y: 0.0
    rotation_deg: 0.0
    n_circle_pts: 220

electrodes:
  mode: boundary
  hi_boundary: top
  lo_boundary: bottom
  hi_span_min: -0.0312
  hi_span_max: 0.0312
  lo_span_min: -0.0312
  lo_span_max: 0.0312
  boundary_cells: 1

electric:
  frequency_hz: 27120000.0
  voltage_v: 860.0
  voltage_mode: grounded
  solver_steps: 1000
  solver_tol: 1.0e-09
  update_interval: 20
  power_factor: 1.0
  max_qrf_w_per_m3: 5.0e8
  zero_qrf_outside_doped: true
  enforce_generator_power: true
  generator_power_w: 500.0
  generator_transfer_efficiency: 1.0
  effective_depth_m: 0.004
  sigma_temp_coeff_per_K: 0.0
  sigma_density_coeff: 0.0
  sigma_ref_temp_c: 23.0

geometry_25d:
  thickness_z: 0.004
  grid_nz: 16
  source_profile: uniform

thermal:
  ambient_c: 23.0
  convection_h_w_per_m2k: 5.0
  convective_boundaries_3d: ["y_max"]
  dt_s: 0.5
  n_steps: 360
  max_deltaT_per_step_c: 0.4
  min_temp_c: -50.0
  max_temp_c: 450.0
  phase_change:
    model: comsol_heaviside
    t_pc_c: 180.0
    dt_pc_c: 10.0
    smooth_shape: linear
    latent_heat_j_per_kg: 96700.0

densification:
  rho_rel_initial: 0.55
  phi_exponent: 1.0
  rho_exponent: 1.0
  max_delta_per_step: 0.02
  surface_tension_n_per_m: 0.03
  particle_radius_m: 3.5e-05
  eta_ref_pa_s: 8.0e3
  eta_ref_temp_k: 458.15
  eta_activation_j_per_mol: 6.0e4
  geom_factor: 0.05

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0
  powder:
    rho_solid_kg_per_m3: 460.0
    k_solid_w_per_mk: 0.1
    cp_solid_j_per_kgk: 1287.0
  doped:
    sigma_s_per_m: 0.04
    eps_r: 20.0
    rho_solid_kg_per_m3: 460.0
    rho_liquid_kg_per_m3: 1010.0
    k_solid_w_per_mk: 0.1
    k_liquid_w_per_mk: 0.26
    cp_solid_j_per_kgk: 2500.0
    cp_liquid_j_per_kgk: 3279.0

reporting:
  e_stream_density: 0.6
