# rfam_eqs_xz_500w_sweep.yaml
#
# XZ cross-section — EQS + surface-sigma, 500W generator, exposure-time sweep
#
# GEOMETRY (x = lateral, y = electrode direction = COMSOL z):
#   chamber_x = 60 mm  (20 mm gap on each side of the 20 mm part)
#   chamber_y = 60 mm  (25 mm gap above and below the 10 mm part)
#   Part: 20 mm wide × 10 mm tall, CENTERED at (0,0)
#   Bottom electrode: V = 860 V  |  Top electrode: V = 0 V
#
# POWER:
#   RF generator output = 500 W.
#   enforce_generator_power = true → Q_rf shape from EQS (surface sigma),
#   magnitude scaled so ∫Q_rf dV_part = generator_power_w × efficiency.
#   effective_depth_m = 0.020 m (20 mm part Y-depth, out-of-plane for XZ view).
#   generator_transfer_efficiency = 1.0 (assume perfect coupling for max-power scenario).
#   At 500 W, nylon 12 (20×20×10mm, 460 kg/m³) heats to melt in ~2 s.
#
# SURFACE SIGMA MODEL:
#   sigma_profile: surface, 2-cell ring (~1 mm).
#   sigma_s_per_m = 0.008 S/m sets the SHAPE (shell-heating ring).
#   enforce_generator_power scales the MAGNITUDE to 500 W.
#
# EXPOSURE TIME SWEEP:
#   dt_s = 0.05 s,  n_steps = 600  →  30 s total simulation
#   time_series.json captures T_mean, T_max, phi at every step.
#   Post-process time_series.json to plot sweep metrics vs exposure time.
#
# MELT:  Nylon 12  T_pc = 180 °C

geometry:
  chamber_x: 0.060    # 60 mm — 20 mm gap each side of 20 mm part
  chamber_y: 0.060    # 60 mm — 25 mm gap above/below 10 mm part
  grid_nx: 120        # 0.5 mm resolution
  grid_ny: 120        # 0.5 mm resolution
  part:
    shape: square
    width:  0.020     # 20 mm wide in x
    height: 0.010     # 10 mm tall in y (electrode direction)
    center_x: 0.0
    center_y: 0.0     # centered: part occupies y = -5 mm to +5 mm
    rotation_deg: 0.0

electrodes:
  mode: boundary
  hi_boundary: top     # y = +30 mm → V = 0
  lo_boundary: bottom  # y = -30 mm → V = 860 V
  boundary_cells: 1

electric:
  frequency_hz: 27120000.0
  voltage_v: 860.0
  voltage_mode: grounded   # hi = 0 V, lo = 860 V
  solver_steps: 3000
  solver_tol: 1.0e-9
  update_interval: 20      # re-solve EQS every 20 thermal steps (1 s at dt=0.05)
  power_factor: 0.5        # 1/2 time-averaging (COMSOL uses 0.5·σ·|E_peak|²)
  max_qrf_w_per_m3: 1.0e11 # high cap — enforce_generator_power controls magnitude
  zero_qrf_outside_doped: true

  # 500 W generator — scales EQS Q_rf to this absorbed power
  enforce_generator_power: true
  generator_power_w: 500.0
  generator_transfer_efficiency: 1.0   # perfect coupling (worst-case / fastest heat)
  effective_depth_m: 0.020             # 20 mm out-of-plane Y-depth of part

thermal:
  ambient_c: 23.0
  convection_h_w_per_m2k: 0.0
  convective_boundaries: []

  # Fine time resolution for the fast 500 W heating
  dt_s: 0.05
  n_steps: 600          # 30 s total — captures full melt front propagation
  max_deltaT_per_step_c: 10.0
  min_temp_c: -50.0
  max_temp_c: 600.0     # allow high T to see pyrolysis onset

  phase_change:
    model: comsol_heaviside
    t_pc_c: 180.0         # Nylon 12 melt temperature
    dt_pc_c: 10.0
    latent_heat_j_per_kg: 96700.0
    smooth_shape: linear

  # Depth correction DISABLED: electrode axis IS the simulation Y-axis.
  depth_correction:
    enabled: false

densification:
  rho_rel_initial: 0.55
  model: physics_dual
  rho_exponent: 1.0
  max_delta_per_step: 0.02
  k0_ss_per_s: 0.005
  activation_energy_ss_j_per_mol: 48000.0
  phi_solid_exponent: 0.8
  k0_liq_per_s: 0.08
  activation_energy_liq_j_per_mol: 0.0
  phi_threshold: 0.01
  phi_liq_exponent: 1.0
  liquid_rate_mode: viscous_capillary
  surface_tension_n_per_m: 0.03
  particle_radius_m: 3.5e-5
  eta_ref_pa_s: 8.0e3
  eta_ref_temp_k: 458.15
  eta_activation_j_per_mol: 6.0e4
  geom_factor: 0.05
  k0_per_s: 0.08
  activation_energy_j_per_mol: 42000.0

materials:
  virgin:
    sigma_s_per_m: 0.0
    eps_r: 2.0

  powder:
    rho_solid_kg_per_m3: 490.0
    k_solid_w_per_mk: 0.197
    cp_solid_j_per_kgk: 1072.0

  doped:
    # Surface sigma model — sets shell-heating Q_rf SHAPE.
    # enforce_generator_power scales the magnitude to 500 W.
    sigma_s_per_m: 0.008         # surface ring conductivity [S/m]
    sigma_profile: surface        # "surface" or "uniform"
    sigma_surface_layers: 2       # 2-cell-wide shell (~1 mm at 0.5 mm grid)
    sigma_interior_s_per_m: 0.001 # near-zero interior conductivity

    eps_r: 20.0
    sigma_temp_coeff_per_K: 0.0
    sigma_density_coeff: 0.0
    sigma_ref_temp_c: 23.0

    rho_solid_kg_per_m3: 460.0
    rho_liquid_kg_per_m3: 1010.0
    k_solid_w_per_mk: 0.10
    k_liquid_w_per_mk: 0.26
    cp_solid_j_per_kgk: 2500.0
    cp_liquid_j_per_kgk: 3279.0

reporting:
  potential_contours: 18
  temp_cbar_min_c: 20.0
  temp_cbar_max_c: 400.0
