<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HEATR Results Browser</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/design-b.css" />
</head>
<body class="ids-inspired">
  <header class="topbar topbar-ids">
    <div>
      <h1>HEATR Results Browser</h1>
      <p>Run-centric view with hero previews and expandable details</p>
    </div>
    <div class="header-tools">
      <div class="status-pill" id="serverStatus">HEATR service connected</div>
      <details class="settings-menu">
        <summary>Settings</summary>
        <div class="settings-grid">
          <label>Mode
            <select id="prefMode"><option value="dark">Dark</option><option value="light">Light</option></select>
          </label>
          <label>Accent
            <select id="prefAccent"><option value="blue">Blue</option><option value="green">Green</option><option value="amber">Amber</option><option value="violet">Violet</option></select>
          </label>
          <label>Background
            <select id="prefBackground"><option value="grid">Grid</option><option value="plain">Plain</option><option value="aurora">Aurora</option></select>
          </label>
          <label>Layout
            <select id="prefLayout"><option value="layout-1">Split</option><option value="layout-2">Stacked</option><option value="layout-3">Dual</option></select>
          </label>
        </div>
      </details>
    </div>
  </header>

  <nav class="tabs-nav">
    <a class="tab-link" href="/index.html">Operation</a>
    <a class="tab-link active" href="/results">Results</a>
    <a class="tab-link" href="/files">Files</a>
    <a class="tab-link" href="/theory">Theory</a>
  </nav>

  <main class="results-page">
    <section class="card dash-card accent-cyan">
      <h2>Runs</h2>
      <div class="run-toolbar">
        <input id="runSearch" type="text" placeholder="Search by run path..." />
        <select id="runGroupFilter">
          <option value="">All groups</option>
        </select>
        <select id="runModeFilter">
          <option value="">All modes</option>
        </select>
        <select id="runStarFilter">
          <option value="">All stars</option>
          <option value="starred">Starred only</option>
          <option value="unstarred">Unstarred only</option>
        </select>
        <select id="runSort">
          <option value="created_newest" selected>Run created: newest to oldest</option>
          <option value="created_oldest">Run created: oldest to newest</option>
          <option value="newest">Last updated: newest to oldest</option>
          <option value="oldest">Last updated: oldest to newest</option>
          <option value="rho_desc">Highest rho</option>
          <option value="tmax_desc">Highest Tmax</option>
          <option value="images_desc">Most images</option>
          <option value="name_az">Name A to Z</option>
          <option value="name_za">Name Z to A</option>
        </select>
        <button id="refreshResults" type="button">Refresh</button>
      </div>
      <div id="runCards" class="run-cards"></div>
    </section>
    <aside class="card dash-card accent-blue metrics-card">
      <h2>Run Metrics</h2>
      <div id="metricsRunName" class="muted">Select a run card to inspect metrics.</div>
      <div id="metricsMeta" class="muted"></div>
      <div id="metricsTableWrap" class="metrics-table-wrap"></div>
    </aside>
  </main>

  <dialog id="imageModal" class="image-modal">
    <div class="image-modal-head">
      <strong id="imageModalTitle">Image</strong>
      <button id="imageModalClose" type="button">Close</button>
    </div>
    <div class="image-modal-body">
      <button id="imagePrev" type="button" class="nav-btn">◀</button>
      <img id="imageModalImg" alt="result" />
      <button id="imageNext" type="button" class="nav-btn">▶</button>
    </div>
  </dialog>

  <script src="/static/settings.js"></script>
  <script src="/static/results.js"></script>
</body>
</html>
