<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HEATR Example Library</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/design-b.css" />
  <link rel="stylesheet" href="/static/hub-theme.css" />
</head>
<body class="ids-inspired">
  <header class="topbar topbar-ids">
    <div>
      <h1>HEATR Example Library</h1>
      <p>Reference sweeps and shape outputs from existing results.</p>
    </div>
    <div class="header-tools">
      <a class="heatr-hub-link" href="http://localhost:5050" title="Back to Research Toolkit Hub">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Hub
      </a>
      <div class="status-pill" id="serverStatus">HEATR service connected</div>
      <details class="settings-menu">
        <summary>Settings</summary>
        <div class="settings-grid">
          <label>Mode
            <select id="prefMode">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <label>Accent
            <select id="prefAccent">
              <option value="blue">Blue</option>
              <option value="green">Green</option>
              <option value="amber">Amber</option>
              <option value="violet">Violet</option>
            </select>
          </label>
          <label>Background
            <select id="prefBackground">
              <option value="grid">Grid</option>
              <option value="plain">Plain</option>
              <option value="aurora">Aurora</option>
            </select>
          </label>
          <label>Layout
            <select id="prefLayout">
              <option value="layout-1">Split</option>
              <option value="layout-2">Stacked</option>
              <option value="layout-3">Dual</option>
            </select>
          </label>
        </div>
      </details>
    </div>
  </header>

  <nav class="tabs-nav">
    <a class="tab-link" href="/index.html">Operation</a>
    <a class="tab-link" href="/results">Results</a>
    <a class="tab-link" href="/files">Files</a>
    <a class="tab-link" href="/heatr3d">HEATR-3D</a>
    <a class="tab-link" href="/theory">Theory</a>
  </nav>

  <main class="examples-layout">
    <section class="card dash-card accent-amber">
      <h2>Master Sweep</h2>
      <div id="masterSweep" class="master-sweep"></div>
    </section>

    <section class="card dash-card accent-blue">
      <h2>Sweep Runs</h2>
      <div id="sweepGrid" class="example-grid"></div>
    </section>

    <section class="card dash-card accent-purple">
      <h2>Shape Outputs</h2>
      <div id="shapeGrid" class="example-grid"></div>
    </section>
  </main>

  <dialog id="imageModal" class="image-modal">
    <div class="image-modal-head">
      <strong id="imageModalTitle">Image</strong>
      <button id="imageModalClose" type="button">Close</button>
    </div>
    <div class="image-modal-body">
      <button id="imagePrev" type="button" class="nav-btn">◀</button>
      <img id="imageModalImg" alt="result" />
      <button id="imageNext" type="button" class="nav-btn">▶</button>
    </div>
  </dialog>

  <script src="/static/settings.js"></script>
  <script src="/static/examples.js"></script>
  <script>/* Keep Research Toolkit Hub alive while this tool is open */
  (function(){function p(){fetch('http://localhost:5050/api/heartbeat',{method:'POST'}).catch(function(){});}p();setInterval(p,5000);})();
  </script>
</body>
</html>
